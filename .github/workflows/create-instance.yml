name: Oracle Instance Creator
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install oci
      - name: Write private key
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "$OCI_PRIVATE_KEY" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
      - name: Try to create instance
        env:
          OCI_USER_OCID:        ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID:     ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT:      ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION:           ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_SUBNET_OCID:      ${{ secrets.OCI_SUBNET_OCID }}
          OCI_SSH_PUBLIC_KEY:   ${{ vars.OCI_SSH_PUBLIC_KEY }}
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          CRONJOB_API_KEY: ${{ secrets.CRONJOB_API_KEY }}
          CRONJOB_JOB_ID:  ${{ secrets.CRONJOB_JOB_ID }}
        run: python create_instance.py